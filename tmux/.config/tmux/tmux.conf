# ~/.config/tmux/tmux.conf

# Use Ctrl-a as prefix instead of Ctrl-b.
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Start windows and panes at 1, renumber on close.
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# More responsive key handling.
set -sg escape-time 10

# Larger scrollback buffer.
set -g history-limit 50000

# Enable mouse support.
set -g mouse on

# True color support.
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Split panes with | and -, keeping the current path.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Vim-style pane navigation.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Reload config.
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# Vi-style copy mode.
setw -g mode-keys vi

# Plugins (managed by TPM).
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'azorng/tmux-smooth-scroll'

# Initialize TPM (keep this line at the very bottom).
run '~/.config/tmux/plugins/tpm/tpm'
